name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check app/ tests/ run.py seed.py

      - name: Tests with coverage
        run: uv run pytest tests/ --cov=app --cov-fail-under=90 -q
